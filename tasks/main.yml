---
- name: Add Vector repository key
  apt_key:
    url: "{{ vector_repo_key }}"
    state: present
  become: true

- name: Add Vector repository
  apt_repository:
    repo: "deb {{ vector_repo_url }} /"
    state: present
  become: true

- name: Install Vector
  apt:
    name: "vector={{ vector_version }}"
    state: present
    update_cache: yes
  become: true

- name: Create Vector config directory
  file:
    path: "{{ vector_config_dir }}"
    state: directory
    mode: '0755'
  become: true

- name: Deploy Vector configuration
  template:
    src: "vector.toml.j2"
    dest: "{{ vector_config_dir }}/{{ vector_config_file }}"
    mode: '0644'
  become: true
  notify: restart vector

- name: Enable and start Vector service
  systemd:
    name: "{{ vector_service_name }}"
    enabled: yes
    state: started
  become: true