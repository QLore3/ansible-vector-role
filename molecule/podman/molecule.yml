---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: vector-podman
    image: ubuntu:22.04
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    command: /sbin/init
provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
verifier:
  name: ansible